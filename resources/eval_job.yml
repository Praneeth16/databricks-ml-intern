# Auto-evaluation job triggered when a new model version lands in
# ml_intern.agent.<name>. Uses MLflow Deployment Jobs (workflow trigger
# pattern: register-model → fan out to evaluator → write score back as a
# tag on the model version).
#
# The eval logic itself lives in scripts/eval_model.py — placeholder today;
# replace with real evals (e.g. lm-eval-harness, custom holdout) once the
# first finetune lands.

resources:
  jobs:
    ml_intern_eval:
      name: ml-intern-eval
      tags:
        ml_intern_purpose: model-eval
      tasks:
        - task_key: evaluate
          spark_python_task:
            python_file: ./scripts/eval_model.py
            parameters:
              - --model
              - "{{job.parameters.model}}"
              - --version
              - "{{job.parameters.version}}"
          new_cluster:
            spark_version: ${var.runtime_ml_gpu}
            num_workers: 0
            # Set ``instance_pool_id`` here once scripts/bootstrap_pool.py
            # has run and the pool id is known; otherwise the cluster
            # provisions on-demand at the configured node type.
            node_type_id: ${var.node_type_gpu}
            spark_conf:
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ml_intern_purpose: model-eval
      parameters:
        - name: model
          default: ml_intern.agent.placeholder
        - name: version
          default: "1"
      # MLflow Deployment Job triggers (fire on every new UC model version)
      # are configured via the MLflow API, not yet via Asset Bundles. After
      # bundle deploy, run scripts/wire_eval_trigger.py to bind this job to
      # ``${var.uc_catalog}.${var.uc_schema}.*``.
